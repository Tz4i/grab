name: Grab
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  Grab:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Grab/Sources
      - path: Grab/Resources/Assets.xcassets
    info:
      path: Grab/Resources/Info.plist
      properties:
        CFBundleName: Grab
        CFBundleDisplayName: Grab
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: Grab/Resources/Grab.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.grab
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
